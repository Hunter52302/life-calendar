name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            os: windows
          - platform: ubuntu-22.04
            args: ''
            os: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: '/api'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PLS Calendar ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `PLS.Calendar_*_x64-setup.exe` |
            | Linux    | `PLS.Calendar_*_amd64.deb` or `PLS.Calendar_*_amd64.AppImage` |

            macOS support coming soon.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Save sig files as artifacts so the manifest job can read them reliably
      - name: Save Linux sig files as artifact
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p /tmp/sigs
          find src-tauri/target/release/bundle/appimage -name "*.AppImage.tar.gz.sig" -exec cp {} /tmp/sigs/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/appimage -name "*.AppImage.tar.gz" -exec cp {} /tmp/sigs/ \; 2>/dev/null || true
          ls -la /tmp/sigs/ || true
        shell: bash

      - name: Upload Linux sig artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-sigs
          path: /tmp/sigs/
          if-no-files-found: warn

      - name: Save Windows sig files as artifact
        if: matrix.platform == 'windows-latest'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p /tmp/winsigs
          find src-tauri/target/release/bundle -name "*.sig" -exec cp {} /tmp/winsigs/ \; 2>/dev/null || true
          ls -la /tmp/winsigs/ || true

      - name: Upload Windows sig artifact
        if: matrix.platform == 'windows-latest'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-sigs
          path: /tmp/winsigs/
          if-no-files-found: warn

  # After builds, generate latest.json from artifacts and publish release
  create-updater-manifest:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux sigs
        uses: actions/download-artifact@v4
        with:
          name: linux-sigs
          path: /tmp/linux-sigs
        continue-on-error: true

      - name: Download Windows sigs
        uses: actions/download-artifact@v4
        with:
          name: windows-sigs
          path: /tmp/windows-sigs
        continue-on-error: true

      - name: Generate latest.json and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE="https://github.com/Hunter52302/life-calendar/releases/download/${TAG}"

          echo "=== Linux sig files ==="
          ls -la /tmp/linux-sigs/ 2>/dev/null || echo "(none)"
          echo "=== Windows sig files ==="
          ls -la /tmp/windows-sigs/ 2>/dev/null || echo "(none)"

          # Find assets in the release
          WIN_EXE=$(gh release view "$TAG" --repo Hunter52302/life-calendar --json assets --jq '.assets[].name' | grep "x64-setup.exe$" | head -1)

          # Build platforms JSON
          PLATFORMS="{}"

          # Linux — find the AppImage tar.gz sig
          LINUX_SIG_FILE=$(ls /tmp/linux-sigs/*.AppImage.tar.gz.sig 2>/dev/null | head -1)
          LINUX_TGZ_FILE=$(ls /tmp/linux-sigs/*.AppImage.tar.gz 2>/dev/null | grep -v ".sig" | head -1)
          if [ -n "$LINUX_SIG_FILE" ] && [ -n "$LINUX_TGZ_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE")
            TGZ_NAME=$(basename "$LINUX_TGZ_FILE")
            # Upload the tar.gz to the release
            gh release upload "$TAG" "$LINUX_TGZ_FILE" --clobber --repo Hunter52302/life-calendar || true
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg url "$BASE/$TGZ_NAME" \
              --arg sig "$LINUX_SIG" \
              '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
            echo "Added linux-x86_64 platform"
          else
            echo "WARNING: Linux sig/tar.gz not found"
          fi

          # Windows — find the exe sig
          WIN_SIG_FILE=$(ls /tmp/windows-sigs/*.exe.sig 2>/dev/null | head -1)
          if [ -n "$WIN_SIG_FILE" ] && [ -n "$WIN_EXE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE")
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg url "$BASE/$WIN_EXE" \
              --arg sig "$WIN_SIG" \
              '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
            echo "Added windows-x86_64 platform"
          else
            echo "WARNING: Windows sig not found"
          fi

          # Write and upload latest.json
          echo "{
            \"version\": \"${VERSION}\",
            \"notes\": \"See the GitHub releases page for what's new.\",
            \"pub_date\": \"${DATE}\",
            \"platforms\": $PLATFORMS
          }" | jq . > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --clobber --repo Hunter52302/life-calendar

          # Publish the release
          gh release edit "$TAG" --draft=false --repo Hunter52302/life-calendar
          echo "Release $TAG published"
