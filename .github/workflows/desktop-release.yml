name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            os: windows
          - platform: ubuntu-22.04
            args: ''
            os: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: '/api'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PLS Calendar ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `PLS Calendar_*_x64-setup.exe` |
            | Linux    | `PLS Calendar_*_amd64.AppImage` |

            macOS support coming soon.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Collect Windows updater metadata
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path updater-metadata | Out-Null

          $sig = Get-ChildItem -Path "src-tauri/target" -Recurse -File -Filter "*.exe.sig" |
            Where-Object { $_.FullName -like "*\bundle\nsis\*" } |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $sig) {
            $sig = Get-ChildItem -Path "src-tauri/target" -Recurse -File -Filter "*.msi.sig" |
              Where-Object { $_.FullName -like "*\bundle\msi\*" } |
              Sort-Object FullName |
              Select-Object -First 1
          }

          if (-not $sig) {
            throw "No signed Windows updater artifact was found."
          }

          $bundlePath = $sig.FullName -replace "\.sig$", ""
          if (-not (Test-Path $bundlePath)) {
            throw "Signed Windows bundle is missing: $bundlePath"
          }

          gh release upload "$env:TAG" "$bundlePath" "$($sig.FullName)" --clobber --repo Hunter52302/life-calendar

          $metadata = [ordered]@{
            platform = "windows-x86_64"
            assetName = Split-Path $bundlePath -Leaf
            signature = (Get-Content -Raw $sig.FullName).Trim()
          }
          $metadata | ConvertTo-Json -Depth 4 | Set-Content -Path updater-metadata/windows.json

      - name: Collect Linux updater metadata
        if: matrix.os == 'linux'
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p updater-metadata

          SIG_FILE=$(find src-tauri/target -path "*/bundle/appimage/*.AppImage.sig" -type f | sort | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "No signed Linux updater artifact was found."
            exit 1
          fi

          BUNDLE_FILE="${SIG_FILE%.sig}"
          if [ ! -f "$BUNDLE_FILE" ]; then
            echo "Signed Linux bundle is missing: $BUNDLE_FILE"
            exit 1
          fi

          gh release upload "$TAG" "$BUNDLE_FILE" "$SIG_FILE" --clobber --repo Hunter52302/life-calendar

          BUNDLE_FILE="$BUNDLE_FILE" SIG_FILE="$SIG_FILE" node -e "
            const fs = require('fs');
            const path = require('path');
            fs.writeFileSync('updater-metadata/linux.json', JSON.stringify({
              platform: 'linux-x86_64',
              assetName: path.basename(process.env.BUNDLE_FILE),
              signature: fs.readFileSync(process.env.SIG_FILE, 'utf8').trim()
            }, null, 2));
          "

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-${{ matrix.os }}
          path: updater-metadata/*.json

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download updater metadata
        uses: actions/download-artifact@v4
        with:
          pattern: updater-metadata-*
          merge-multiple: true
          path: updater-metadata

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const version = require('./package.json').version;
          const base = `https://github.com/Hunter52302/life-calendar/releases/download/${process.env.TAG}`;
          const platforms = {};

          for (const file of fs.readdirSync('updater-metadata').filter(name => name.endsWith('.json'))) {
            const meta = JSON.parse(fs.readFileSync(path.join('updater-metadata', file), 'utf8'));
            platforms[meta.platform] = {
              url: `${base}/${encodeURIComponent(meta.assetName)}`,
              signature: meta.signature,
            };
          }

          for (const platform of ['windows-x86_64', 'linux-x86_64']) {
            if (!platforms[platform]) {
              throw new Error(`Missing updater metadata for ${platform}`);
            }
          }

          const latest = {
            version,
            notes: 'See the GitHub release for changes.',
            pub_date: new Date().toISOString(),
            platforms,
          };

          fs.writeFileSync('latest.json', `${JSON.stringify(latest, null, 2)}\n`);
          NODE

      - name: Upload latest.json and publish release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" latest.json --clobber --repo Hunter52302/life-calendar
          gh release edit "$TAG" --draft=false --repo Hunter52302/life-calendar
