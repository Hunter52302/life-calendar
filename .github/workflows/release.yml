name: Build Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, e.g. v1.0.12"
        required: true
        default: "v1.0.12"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri:build

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $nsisFile = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $nsisFile) {
            throw "No Windows .exe installer was found in src-tauri/target/release/bundle/nsis."
          }
          Copy-Item $nsisFile.FullName "$outDir/PLS-Calendar-v$version-setup.exe"

          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $msiFile) {
            throw "No Windows .msi installer was found in src-tauri/target/release/bundle/msi."
          }
          Copy-Item $msiFile.FullName "$outDir/PLS-Calendar-v$version.msi"

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --no-sign

      - name: Stage macOS release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          out_dir="release-assets"
          mkdir -p "$out_dir"

          shopt -s nullglob
          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "No macOS .dmg was found in src-tauri/target/release/bundle/dmg."
            exit 1
          fi

          cp "${dmg_files[0]}" "$out_dir/PLS-Calendar-v${version}-macos-${{ matrix.arch }}.dmg"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PLS Calendar ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
          make_latest: true
