name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $version = $version -replace '^v', ''
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $nsisFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($file in $nsisFiles) {
            Copy-Item $file.FullName "$outDir/PLS-Calendar-v$version-setup.exe"
          }

          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
          foreach ($file in $msiFiles) {
            Copy-Item $file.FullName "$outDir/PLS-Calendar-v$version.msi"
          }

          if (-not (Get-ChildItem -Path $outDir -File -ErrorAction SilentlyContinue)) {
            throw "No Windows installer assets were found in Tauri bundle output."
          }

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
