name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, e.g. v1.0.11"
        required: true
        default: "v1.0.11"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $version = "$env:RELEASE_TAG"
          $version = $version -replace '^v', ''
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $nsisFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($file in $nsisFiles) {
            Copy-Item $file.FullName "$outDir/PLS-Calendar-v$version-setup.exe"
          }

          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
          foreach ($file in $msiFiles) {
            Copy-Item $file.FullName "$outDir/PLS-Calendar-v$version.msi"
          }

          if (-not (Get-ChildItem -Path $outDir -File -ErrorAction SilentlyContinue)) {
            throw "No Windows installer assets were found in Tauri bundle output."
          }

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PLS Calendar ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
          make_latest: true
