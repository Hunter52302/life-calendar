name: Release

# One tag → everything ships. Pushing a `vX.Y.Z` tag (or running this manually
# with a tag input) is the SINGLE release trigger for all four targets:
#
#   • build-windows / build-macos → desktop installers
#   • publish                     → GitHub Release with those installers
#   • mobile-ota                  → Expo EAS over-the-air update
#   • deploy-coolify              → web frontend + API backend redeploy (Coolify)
#
# Nothing keys off a plain `master` push anymore, so the web app can no longer
# drift a version behind the desktop/mobile builds. Bump the version, tag, push
# the tag — done.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, e.g. v1.0.13"
        required: true
        default: "v1.0.13"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri:build

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $nsisFile = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $nsisFile) {
            throw "No Windows .exe installer was found in src-tauri/target/release/bundle/nsis."
          }
          Copy-Item $nsisFile.FullName "$outDir/PLS-Calendar-v$version-setup.exe"

          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $msiFile) {
            throw "No Windows .msi installer was found in src-tauri/target/release/bundle/msi."
          }
          Copy-Item $msiFile.FullName "$outDir/PLS-Calendar-v$version.msi"

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

      - name: Collect Windows updater metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:RELEASE_TAG" -replace '^v', ''
          New-Item -ItemType Directory -Force -Path updater-metadata | Out-Null

          # createUpdaterArtifacts produced a minisign .sig next to the NSIS
          # installer. The signature is over the file BYTES, so it stays valid
          # for the renamed copy we uploaded to the release.
          $sig = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe.sig" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $sig) {
            throw "No Windows updater signature (.sig) was produced — is TAURI_SIGNING_PRIVATE_KEY set?"
          }

          $meta = [ordered]@{
            platform  = "windows-x86_64"
            assetName = "PLS-Calendar-v$version-setup.exe"   # matches the installer uploaded above
            signature = (Get-Content -Raw $sig.FullName).Trim()
          }
          $meta | ConvertTo-Json -Depth 4 | Set-Content -Path "updater-metadata/windows.json"

      - name: Upload Windows updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-windows
          path: updater-metadata/*.json
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        # Do NOT pass --no-sign here. It reads as "skip Apple code-signing", but
        # it also skips minisign UPDATER signing, so the .app.tar.gz ships
        # without its .sig and macOS drops out of latest.json entirely. Apple
        # signing is already a no-op without a signing identity configured.
        run: npm run tauri:build

      - name: Stage macOS release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          out_dir="release-assets"
          mkdir -p "$out_dir"

          shopt -s nullglob
          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "No macOS .dmg was found in src-tauri/target/release/bundle/dmg."
            exit 1
          fi

          cp "${dmg_files[0]}" "$out_dir/PLS-Calendar-v${version}-macos-${{ matrix.arch }}.dmg"

      - name: Collect macOS updater artifact + metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          out_dir="release-assets"
          meta_dir="updater-metadata"
          mkdir -p "$out_dir" "$meta_dir"

          shopt -s nullglob
          # macOS auto-update ships the .app.tar.gz (NOT the DMG). Fail loudly if
          # it is unsigned: skipping it here just publishes a release that looks
          # green while every Mac silently stops receiving updates.
          sigs=(src-tauri/target/release/bundle/macos/*.app.tar.gz.sig)
          if [ "${#sigs[@]}" -eq 0 ]; then
            echo "::error::No macOS updater signature for ${{ matrix.arch }} — Macs would get no auto-updates. Is TAURI_SIGNING_PRIVATE_KEY set, or did a --no-sign flag creep back in?"
            exit 1
          fi

          sig="${sigs[0]}"
          bundle="${sig%.sig}"
          if [ ! -f "$bundle" ]; then
            echo "::error::macOS updater bundle missing for ${{ matrix.arch }} (found $sig but no $bundle)."
            exit 1
          fi

          case "${{ matrix.arch }}" in
            arm64) platform="darwin-aarch64" ;;
            x64)   platform="darwin-x86_64" ;;
            *)     echo "::error::Unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac

          asset_name="PLS-Calendar-v${version}-macos-${{ matrix.arch }}.app.tar.gz"
          cp "$bundle" "$out_dir/$asset_name"

          SIG_FILE="$sig" ASSET_NAME="$asset_name" PLATFORM="$platform" node -e "
            const fs = require('fs');
            fs.writeFileSync('$meta_dir/macos-${{ matrix.arch }}.json', JSON.stringify({
              platform:  process.env.PLATFORM,
              assetName: process.env.ASSET_NAME,
              signature: fs.readFileSync(process.env.SIG_FILE, 'utf8').trim(),
            }, null, 2));
          "

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: Upload macOS updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-macos-${{ matrix.arch }}
          path: updater-metadata/*.json
          if-no-files-found: error

  build-linux:
    name: Build Linux (.deb / .AppImage)
    # Pin to 22.04: the AppImage links against the runner's glibc, so building on
    # the oldest supported runner keeps it runnable on more user systems.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libfuse2 \
            patchelf \
            file

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        # Only the two bundles the app surfaces for download; skips rpm so a
        # missing rpm toolchain can't fail the release.
        run: npm run tauri:build -- --bundles deb,appimage

      - name: Stage Linux release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          out_dir="release-assets"
          mkdir -p "$out_dir"

          shopt -s nullglob
          deb_files=(src-tauri/target/release/bundle/deb/*.deb)
          if [ "${#deb_files[@]}" -eq 0 ]; then
            echo "No Linux .deb was found in src-tauri/target/release/bundle/deb."
            exit 1
          fi
          cp "${deb_files[0]}" "$out_dir/PLS-Calendar-v${version}-amd64.deb"

          appimage_files=(src-tauri/target/release/bundle/appimage/*.AppImage)
          if [ "${#appimage_files[@]}" -eq 0 ]; then
            echo "No Linux .AppImage was found in src-tauri/target/release/bundle/appimage."
            exit 1
          fi
          cp "${appimage_files[0]}" "$out_dir/PLS-Calendar-v${version}-x86_64.AppImage"

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: release-assets/*
          if-no-files-found: error

      - name: Collect Linux updater metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          meta_dir="updater-metadata"
          mkdir -p "$meta_dir"

          shopt -s nullglob
          # On Linux the AppImage IS the updater artifact; its .sig is over the
          # file bytes, so it stays valid for the renamed copy uploaded above.
          sigs=(src-tauri/target/release/bundle/appimage/*.AppImage.sig)
          if [ "${#sigs[@]}" -eq 0 ]; then
            echo "::error::No Linux updater signature (.AppImage.sig) — Linux would get no auto-updates. Is TAURI_SIGNING_PRIVATE_KEY set?"
            exit 1
          fi

          SIG_FILE="${sigs[0]}" ASSET_NAME="PLS-Calendar-v${version}-x86_64.AppImage" node -e "
            const fs = require('fs');
            fs.writeFileSync('$meta_dir/linux.json', JSON.stringify({
              platform:  'linux-x86_64',
              assetName: process.env.ASSET_NAME,
              signature: fs.readFileSync(process.env.SIG_FILE, 'utf8').trim(),
            }, null, 2));
          "

      - name: Upload Linux updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-linux
          path: updater-metadata/*.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Download updater metadata
        uses: actions/download-artifact@v4
        with:
          pattern: updater-metadata-*
          merge-multiple: true
          path: updater-metadata

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate latest.json (desktop auto-update manifest)
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const tag = process.env.TAG;
          const version = tag.replace(/^v/, '');
          const base = `https://github.com/Hunter52302/life-calendar/releases/download/${tag}`;

          // One entry per platform whose build produced a signed updater artifact.
          const platforms = {};
          const dir = 'updater-metadata';
          const files = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => f.endsWith('.json')) : [];
          for (const file of files) {
            const meta = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
            platforms[meta.platform] = {
              url: `${base}/${encodeURIComponent(meta.assetName)}`,
              signature: meta.signature,
            };
          }

          // Every platform we ship an installer for must also be updatable. A
          // manifest missing a platform is invisible in a green release but
          // freezes those users on whatever they installed — which is exactly
          // how macOS went un-updatable from v1.2.8 through v1.2.10.
          const REQUIRED = ['windows-x86_64', 'linux-x86_64', 'darwin-aarch64', 'darwin-x86_64'];
          const missing = REQUIRED.filter(p => !platforms[p]);
          if (missing.length) {
            throw new Error(
              `latest.json is missing ${missing.join(', ')} — those users would silently never be offered an update. ` +
              `Got: ${Object.keys(platforms).join(', ') || '(none)'}`
            );
          }

          const latest = {
            version,
            notes: `See the GitHub release for changes: https://github.com/Hunter52302/life-calendar/releases/tag/${tag}`,
            pub_date: new Date().toISOString(),
            platforms,
          };

          fs.mkdirSync('release-assets', { recursive: true });
          fs.writeFileSync('release-assets/latest.json', JSON.stringify(latest, null, 2) + '\n');
          console.log('Generated latest.json for platforms:', Object.keys(platforms).join(', ') || '(none)');
          NODE

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PLS Calendar ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
          make_latest: true

  mobile-ota:
    name: Publish mobile OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        working-directory: mobile
        run: eas update --branch production --message "${RELEASE_TAG}" --non-interactive

  deploy-coolify:
    name: Deploy web + API (Coolify)
    runs-on: ubuntu-latest
    # No `needs:` — the web/API deploy is independent of the (slow) desktop
    # builds so the live site updates promptly and isn't blocked by a macOS/
    # Windows build hiccup. Coolify rebuilds the frontend + backend resources
    # from their configured branch (master), which is where the tag lives.
    steps:
      - name: Trigger Coolify deployments
        # COOLIFY_RESOURCE_UUIDS is a comma-separated list of the frontend and
        # backend resource UUIDs (from each resource's Coolify URL/settings).
        # One API call deploys them both.
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_URL}" ] || [ -z "${COOLIFY_TOKEN}" ] || [ -z "${COOLIFY_RESOURCE_UUIDS}" ]; then
            echo "::warning::Coolify deploy secrets not set (COOLIFY_URL / COOLIFY_TOKEN / COOLIFY_RESOURCE_UUIDS) — skipping API deploy. Add the secrets to enable tag-triggered web/API deploys."
            exit 0
          fi
          # force=false: each release is a new commit, so Coolify rebuilds anyway
          # (Vite's build layer busts on changed source → fresh __APP_VERSION__),
          # while reusing safe layer cache. force=true would no-cache-rebuild every
          # time and pile disk onto the host — a common cause of Coolify falling
          # over. Trigger a clean rebuild from the Coolify UI on the rare cache issue.
          curl --fail-with-body -sS -X GET \
            "${COOLIFY_URL%/}/api/v1/deploy?uuid=${COOLIFY_RESOURCE_UUIDS}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_RESOURCE_UUIDS: ${{ secrets.COOLIFY_RESOURCE_UUIDS }}
