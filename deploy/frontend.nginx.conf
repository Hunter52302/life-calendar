# Static-serve config for the PLS Calendar web app (built by frontend.Dockerfile).
#
# Cache policy is the whole reason this file exists:
#   • /assets/* are content-hashed by Vite → a new build = a new URL, so they
#     are safe to cache forever (immutable). This is what keeps the app fast.
#   • sw.js / registerSW.js / sw-push.js / manifest.webmanifest / index.html
#     must NEVER be cached. The service worker is the update unit for the PWA;
#     if a CDN or browser serves a stale sw.js, it precaches an old bundle and
#     the app is frozen on an old version (stale __APP_VERSION__). no-cache
#     forces revalidation with the origin on every request, so deploys land
#     immediately. Origin no-cache also stops Cloudflare from edge-caching them.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Content-hashed build output — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # PWA control files + service worker — always revalidate, never cache.
    location = /sw.js                { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js        { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /sw-push.js           { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /index.html           { add_header Cache-Control "no-cache"; }

    # SPA routing: any non-file path falls back to the (uncached) app shell.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
